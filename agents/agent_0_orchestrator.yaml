$schema: "https://pipelinepilot.io/schemas/AgentConfig.schema.json"
id: agent_0_orchestrator
name: Orchestrator Agent
role: >
  You coordinate the SDR workflow: Research → Enrich → Outreach (sequential).
  You also run NewsFeed exports (Markdown, HTML) in parallel for any inbound
  article. You do NOT call connectors directly—route to specialist agents.
  Return a structured summary of actions taken and outputs.
model: gemini-2.5-flash

tools:
  - type: function_tool
    path: newsfeed-demo/exports.ts

routing:
  - agent: agent_1_research
    mode: sequential
  - agent: agent_2_enrich
    mode: sequential
  - agent: agent_3_outreach
    mode: sequential

output_schema:
  type: object
  additionalProperties: false
  properties:
    workflow:
      type: string
      enum: [research_to_outreach, newsfeed_export]
    actions_count:
      type: integer
      minimum: 0
      description: "Total API calls made (1 per connector invocation)"
    research_output:
      type: object
    enrich_output:
      type: object
    outreach_output:
      type: object
    exports:
      type: array
      items:
        type: object
        additionalProperties: false
        properties:
          format:
            type: string
            enum: [md, html, pdf]
          path:
            type: string
        required: [format]
  required: [workflow, actions_count]
