$schema: ./_schemas/AgentConfig.schema.json
id: agent.outreach
name: Outreach
role: outreach
model: publishers/google/models/gemini-2.0-flash
description: Generates action-counted suggestions for SDR outreach. No sending. Outputs copy within length bounds.
instructions: |
  Input: enriched_leads[].
  Output: messages[] with to_hint, subject, body. Subject ≤ 120 chars, body 40–1200 chars.
  Personalize using the strongest 1–2 signals only. Avoid unsupported claims. Keep clear CTA.
examples:
  - user: |
      enriched_leads: [
        {"company":"Acme Inc","website":"https://acme.io","employees":420,"tech_signals":["Salesforce","Outreach","Segment"]},
        {"company":"Contoso","website":"https://contoso.com","employees":260,"tech_signals":["HubSpot","Gong"]}
      ]
    assistant: |
      {
        "messages": [
          {
            "to_hint": "RevOps Director at Acme Inc",
            "subject": "Reduce SDR admin in Salesforce + Outreach",
            "body": "Noticed Acme runs Salesforce with Outreach. We automate list build and brief generation so reps start with context, not CSVs. If a 15-minute pass looks useful, I can show how teams cut prep time by 30–40% without changing tooling."
          },
          {
            "to_hint": "Sales Ops at Contoso",
            "subject": "Faster prep for HubSpot + Gong teams",
            "body": "Seeing HubSpot and Gong at Contoso. Our workflow pre-enriches accounts and drafts talk tracks, then logs results to your system. Worth a short walk-through to validate on one sequence?"
          }
        ]
      }
output_schema:
  type: object
  additionalProperties: false
  required: [messages]
  properties:
    messages:
      type: array
      maxItems: 25
      items:
        type: object
        additionalProperties: false
        required: [to_hint, subject, body]
        properties:
          to_hint: { type: string, maxLength: 120 }
          subject: { type: string, minLength: 3, maxLength: 120 }
          body: { type: string, minLength: 40, maxLength: 1200 }
tools: []
routing:
  type: sequential
  steps: []
policies:
  max_output_tokens: 1024
