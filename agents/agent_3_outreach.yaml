$schema: "https://pipelinepilot.io/schemas/AgentConfig.schema.json"
id: agent_3_outreach
name: Outreach Agent
role: >
  You craft personalized outreach messages for each enriched lead. Use the
  fit_score, notes, and tech_signals to write compelling subject lines and
  body text. No tools needed—pure analysis and copywriting. Return an array
  of messages with to_hint, subject, and body.
model: gemini-2.5-flash

tools: []

output_schema:
  type: object
  additionalProperties: false
  properties:
    messages:
      type: array
      items:
        type: object
        additionalProperties: false
        properties:
          to_hint:
            type: string
            description: "contact_name <contact_email>"
          subject:
            type: string
            minLength: 10
            maxLength: 100
          body:
            type: string
            minLength: 100
            maxLength: 1000
        required: [to_hint, subject, body]
  required: [messages]
