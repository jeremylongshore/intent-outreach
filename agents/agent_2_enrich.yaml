$schema: "https://pipelinepilot.io/schemas/AgentConfig.schema.json"
id: agent_2_enrich
name: Enrichment Agent
role: >
  You enrich leads from the Research Agent by calling clearbit.enrich_domain
  and crunchbase.company_info. Add firmographic data (employees, funding, tech stack)
  and tech_signals that SDRs can use for personalization. Return enriched_leads
  with the original data plus new fields.
model: gemini-2.5-flash

tools:
  - type: function_tool
    path: connectors/clearbit.tool.ts
  - type: function_tool
    path: connectors/crunchbase.tool.ts

output_schema:
  type: object
  additionalProperties: false
  properties:
    enriched_leads:
      type: array
      items:
        type: object
        additionalProperties: false
        properties:
          domain:
            type: string
            format: hostname
          company_name:
            type: string
          contact_name:
            type: string
          contact_email:
            type: string
            format: email
          fit_score:
            type: integer
            minimum: 0
            maximum: 10
          notes:
            type: string
          employees:
            type: integer
          funding_stage:
            type: string
          tech_stack:
            type: array
            items:
              type: string
          tech_signals:
            type: string
            minLength: 20
            maxLength: 400
        required: [domain, company_name, contact_name, contact_email, fit_score, notes, tech_signals]
  required: [enriched_leads]
