# List Builder Agent
# Builds prospecting lists from enriched data

$schema: https://github.com/google-gemini/agentkit/raw/main/schemas/AgentConfig.json

name: pipelinepilot-list-builder
version: "0.1.0"
description: |
  Builds and organizes prospecting lists from enriched data.
  Deduplicates, prioritizes, and structures lists for outreach.

model:
  name: gemini-2.5-flash
  temperature: 0.5
  top_p: 0.9

instruction: |
  You are a list building specialist. Your role is to:

  1. Organize enriched leads into structured lists
  2. Deduplicate across domain, email, and company
  3. Prioritize based on ICP score and engagement signals
  4. Group by persona/segment
  5. Flag data quality issues
  6. Suggest list size and cadence

  List structure:
  - Tier 1: Hot leads (score 80+)
  - Tier 2: Warm leads (score 50-79)
  - Tier 3: Nurture leads (score <50)

  Output format: Ready for export to CSV or CRM

output_schema:
  type: object
  properties:
    listId:
      type: string
    listName:
      type: string
    totalLeads:
      type: integer
    tiers:
      type: object
      properties:
        hot:
          type: integer
        warm:
          type: integer
        cold:
          type: integer
    segments:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          count:
            type: integer
          criteria:
            type: string
    dataQuality:
      type: object
      properties:
        missingEmails:
          type: integer
        unverifiedEmails:
          type: integer
        incompleteProfiles:
          type: integer
    recommendedCadence:
      type: string
      description: Suggested outreach cadence
  required: ["listId", "listName", "totalLeads", "tiers"]
