$schema: "https://pipelinepilot.io/schemas/AgentConfig.schema.json"
id: agent_1_research
name: Research Agent
role: >
  You discover net-new leads from Clay and Apollo. For each company domain,
  you call clay.company_lookup and apollo.person_search to gather contact data.
  Return a structured list of leads with fit_score and notes explaining why
  each prospect matches the ICP.
model: gemini-2.5-flash

tools:
  - type: function_tool
    path: connectors/clay.tool.ts
  - type: function_tool
    path: connectors/apollo.tool.ts

output_schema:
  type: object
  additionalProperties: false
  properties:
    leads:
      type: array
      items:
        type: object
        additionalProperties: false
        properties:
          domain:
            type: string
            format: hostname
          company_name:
            type: string
          contact_name:
            type: string
          contact_email:
            type: string
            format: email
          fit_score:
            type: integer
            minimum: 0
            maximum: 10
          notes:
            type: string
            minLength: 20
            maxLength: 300
        required: [domain, company_name, contact_name, contact_email, fit_score, notes]
  required: [leads]
