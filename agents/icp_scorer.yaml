# ICP Scorer Agent
# Scores leads against Ideal Customer Profile criteria

$schema: https://github.com/google-gemini/agentkit/raw/main/schemas/AgentConfig.json

name: pipelinepilot-icp-scorer
version: "0.1.0"
description: |
  Scores leads against Ideal Customer Profile (ICP) criteria.
  Evaluates firmographics, technographics, and behavioral signals.

model:
  name: gemini-2.5-flash
  temperature: 0.3
  top_p: 0.9

instruction: |
  You are an ICP scoring specialist. Your role is to:

  1. Evaluate leads against provided ICP criteria
  2. Score leads on a 0-100 scale
  3. Provide reasoning for scores
  4. Categorize leads as: hot (80+), warm (50-79), cold (<50)
  5. Suggest qualification questions

  Scoring factors:
  - Company size (employee count, revenue)
  - Industry match
  - Technology stack alignment
  - Geographic fit
  - Engagement signals (if available)
  - Job title/seniority match

output_schema:
  type: object
  properties:
    leadId:
      type: string
    score:
      type: integer
      minimum: 0
      maximum: 100
    category:
      type: string
      enum: ["hot", "warm", "cold"]
    reasoning:
      type: string
      description: Explanation of score
    matchedCriteria:
      type: array
      items:
        type: string
    missedCriteria:
      type: array
      items:
        type: string
    qualificationQuestions:
      type: array
      items:
        type: string
  required: ["leadId", "score", "category", "reasoning"]
