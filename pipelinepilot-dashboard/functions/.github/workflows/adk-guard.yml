name: ADK Guard - Forbidden Patterns Blocker

on:
  pull_request:
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'requirements*.txt'
  push:
    branches:
      - main
      - 'migration/**'

jobs:
  adk-guard:
    name: Block Forbidden Patterns
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Check for YAML agent definitions
        id: yaml_check
        run: |
          echo "Checking for YAML agent definitions..."
          if rg -l "\.ya?ml$" src/ 2>/dev/null | grep -E "(agent|agents)\.ya?ml"; then
            echo "❌ FORBIDDEN: YAML agent definitions found"
            echo "status=fail" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ No YAML agent definitions found"
            echo "status=pass" >> $GITHUB_OUTPUT
          fi

      - name: Check for LangChain imports
        id: langchain_check
        run: |
          echo "Checking for LangChain imports..."
          if rg -n "from langchain|import langchain" src/ 2>/dev/null; then
            echo "❌ FORBIDDEN: LangChain imports found"
            echo "status=fail" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ No LangChain imports found"
            echo "status=pass" >> $GITHUB_OUTPUT
          fi

      - name: Check for LlamaIndex usage
        id: llamaindex_check
        run: |
          echo "Checking for LlamaIndex..."
          if rg -n "llama_index|from llama|import llama" src/ 2>/dev/null; then
            echo "❌ FORBIDDEN: LlamaIndex found"
            echo "status=fail" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ No LlamaIndex found"
            echo "status=pass" >> $GITHUB_OUTPUT
          fi

      - name: Check for Genkit usage
        id: genkit_check
        run: |
          echo "Checking for Genkit..."
          if rg -n "genkit|from genkit|import genkit" src/ 2>/dev/null; then
            echo "❌ FORBIDDEN: Genkit found"
            echo "status=fail" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ No Genkit found"
            echo "status=pass" >> $GITHUB_OUTPUT
          fi

      - name: Check for OpenAI API keys
        id: openai_check
        run: |
          echo "Checking for OpenAI API keys..."
          if rg -n "OPENAI_API_KEY|openai\.api_key" src/ .env* 2>/dev/null | grep -v "^#"; then
            echo "❌ FORBIDDEN: OpenAI API keys found"
            echo "status=fail" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ No OpenAI API keys found"
            echo "status=pass" >> $GITHUB_OUTPUT
          fi

      - name: Verify Python ADK usage
        id: adk_check
        run: |
          echo "Verifying Python ADK usage..."
          if ! rg -l "from vertexai|import vertexai" src/agents/ 2>/dev/null; then
            echo "⚠️ WARNING: No Vertex AI imports found"
            echo "status=warn" >> $GITHUB_OUTPUT
          else
            echo "✅ Vertex AI imports found"
            echo "status=pass" >> $GITHUB_OUTPUT
          fi

      - name: Generate compliance report
        if: always()
        run: |
          echo "## ADK Guard Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| YAML Agents | pass |" >> $GITHUB_STEP_SUMMARY
          echo "| LangChain | pass |" >> $GITHUB_STEP_SUMMARY
          echo "| LlamaIndex | pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Genkit | pass |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenAI Keys | pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Vertex AI ADK | pass |" >> $GITHUB_STEP_SUMMARY
