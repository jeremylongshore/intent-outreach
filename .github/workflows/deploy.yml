name: Deploy to Vertex AI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Agents

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ARV validation
        run: npm run arv

      - name: Run NewsFeed demo
        run: npm run demo

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Vertex AI
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify agent YAMLs exist
        run: |
          echo "✅ Verifying agent YAML files..."
          ls -la agents/*.yaml
          echo ""
          echo "Found $(ls agents/*.yaml | wc -l) agent YAML files"

      - name: Upload agents as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-yamls
          path: agents/*.yaml

      - name: Deployment summary
        run: |
          echo "✅ Validation complete!"
          echo "Project: ${{ secrets.GCP_PROJECT }}"
          echo "Region: ${{ secrets.GCP_REGION }}"
          echo "Agents ready for deployment: 4 (orchestrator, research, enrich, outreach)"
          echo ""
          echo "📝 To deploy agents to Vertex AI:"
          echo "1. Install ADK locally: pip install google-adk"
          echo "2. Deploy each agent:"
          echo "   adk deploy agent_engine --project=${{ secrets.GCP_PROJECT }} --region=${{ secrets.GCP_REGION }} agents/agent_0_orchestrator.yaml"
          echo ""
          echo "Or deploy via gcloud CLI - see GCP_SETUP.md for instructions"
